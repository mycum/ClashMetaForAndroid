name: Generate RU Test Proxies

on:
  schedule:
    # Запускаем через 30 минут после основного скрипта, чтобы они не конфликтовали
    - cron: '30 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-test-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Process Proxy List (RU Only)
        run: |
          mkdir -p proxy_lists
          
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt > proxy_lists/ru_test_proxies.txt
          
          sed -i 's/obfs=none&//g' proxy_lists/ru_test_proxies.txt
          sed -i 's/&obfs=none//g' proxy_lists/ru_test_proxies.txt
          
          cat << 'EOF' > filter_ru.py
          import urllib.request, json, re, socket, urllib.parse, base64

          with open('proxy_lists/ru_test_proxies.txt', 'r') as f:
              lines = f.readlines()

          hosts = []
          for line in lines:
              match = re.search(r'@([^:/?#]+)', line)
              hosts.append(match.group(1) if match else "")

          ips = []
          for h in hosts:
              try:
                  ips.append(socket.gethostbyname(h) if h else "")
              except:
                  ips.append("")

          unique_ips = list(set([ip for ip in ips if ip]))
          ip_info = {}
          for i in range(0, len(unique_ips), 100):
              batch = unique_ips[i:i+100]
              req = urllib.request.Request('http://ip-api.com/batch?fields=query,countryCode', 
                                           data=json.dumps(batch).encode(), 
                                           headers={'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as resp:
                      for r in json.loads(resp.read().decode()):
                          ip_info[r.get('query')] = r
              except:
                  pass

          clean_lines = []
          ru_count = 0

          for line, ip in zip(lines, ips):
              line = line.strip()
              if not line or line.startswith('#'):
                  clean_lines.append(line + '\n')
                  continue

              parts = line.split('#')
              base_url = parts[0]
              
              # Конвертер SS -> VLESS
              if base_url.startswith('ss://'):
                  try:
                      match = re.search(r'ss://([^@]+)@([^/?#]+)/?\?([^#]+)', base_url)
                      if match:
                          b64_info, host_port, query = match.groups()
                          b64_info += "=" * ((4 - len(b64_info) % 4) % 4)
                          userinfo = base64.b64decode(b64_info).decode('utf-8')
                          
                          if userinfo.startswith('none:'):
                              uuid = userinfo.split(':', 1)[1]
                              qs = urllib.parse.parse_qs(query)
                              plugin_str = qs.get('plugin', [''])[0]
                              
                              opts = plugin_str.split(';')
                              ws_host = ""
                              ws_path = "/"
                              tls = "none"
                              for opt in opts:
                                  if opt.startswith('host='): ws_host = opt[5:]
                                  elif opt.startswith('path='): ws_path = opt[5:].replace('\\=', '=')
                                  elif opt == 'tls': tls = "tls"
                                  
                              base_url = f"vless://{uuid}@{host_port}?type=ws&security={tls}&host={ws_host}&path={urllib.parse.quote(ws_path)}"
                  except Exception as e:
                      pass

              if " " in base_url or "🇨🇳" in base_url:
                  continue
              if base_url.startswith('ss://') and "plugin=" in base_url.lower():
                  continue

              original_name = urllib.parse.unquote(parts[1]) if len(parts) > 1 else "Unknown"
              info = ip_info.get(ip, {})
              geo_code = info.get('countryCode')

              # === ИНВЕРСИЯ ЛОГИКИ: ИЩЕМ ТОЛЬКО РОССИЮ ===
              is_ru = False
              if any(x in original_name for x in ["Russia", "🇷🇺", "Россия"]) or ".ru" in base_url:
                  is_ru = True
              if geo_code == 'RU':
                  is_ru = True

              # Если это НЕ Россия - выбрасываем строку
              if not is_ru:
                  continue

              # Переименовываем для понятности
              ru_count += 1
              final_name = f"🇷🇺 RU Quarantine {ru_count}"

              new_line = base_url + '#' + urllib.parse.quote(final_name) + '\n'
              clean_lines.append(new_line)

          with open('proxy_lists/ru_test_proxies.txt', 'w') as f:
              f.writelines(clean_lines)
          EOF
          
          python3 filter_ru.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: RU Quarantine Test List"
          file_pattern: proxy_lists/ru_test_proxies.txt
