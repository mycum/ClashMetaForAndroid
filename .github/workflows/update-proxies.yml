name: Update, Fix, Filter and Rename Proxies

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Process Proxy List
        run: |
          mkdir -p proxy_lists
          
          # Скачиваем оригинальный список
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt > proxy_lists/fixed_proxies.txt
          
          # 1. Исправляем баг Hysteria2
          sed -i 's/obfs=none&//g' proxy_lists/fixed_proxies.txt
          sed -i 's/&obfs=none//g' proxy_lists/fixed_proxies.txt
          
          # 2. Python-скрипт: GeoIP фильтрация + Переименование
          cat << 'EOF' > filter.py
          import urllib.request, json, re, socket, urllib.parse
          
          with open('proxy_lists/fixed_proxies.txt', 'r') as f:
              lines = f.readlines()
              
          hosts = []
          for line in lines:
              # Выцепляем домен или IP из ссылки (между @ и : или ?)
              match = re.search(r'@([^:/?#]+)', line)
              hosts.append(match.group(1) if match else "")
              
          ips = []
          for h in hosts:
              try:
                  ips.append(socket.gethostbyname(h) if h else "")
              except:
                  ips.append("")
                  
          unique_ips = list(set([ip for ip in ips if ip]))
          ip_info = {}
          
          # Запрашиваем не только код (countryCode), но и название страны (country)
          for i in range(0, len(unique_ips), 100):
              batch = unique_ips[i:i+100]
              req = urllib.request.Request('http://ip-api.com/batch?fields=query,countryCode,country', 
                                           data=json.dumps(batch).encode(), 
                                           headers={'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as resp:
                      for r in json.loads(resp.read().decode()):
                          ip_info[r.get('query')] = r
              except:
                  pass
                  
          # Функция превращения кода страны (US) в эмодзи флага (🇺🇸)
          def get_flag(code):
              if not code or len(code) != 2: return "🌍"
              return chr(ord(code[0]) + 127397) + chr(ord(code[1]) + 127397)
                  
          clean_lines = []
          for line, ip in zip(lines, ips):
              line = line.strip()
              # Оставляем комментарии автора файла как есть
              if not line or line.startswith('#'):
                  clean_lines.append(line + '\n')
                  continue
                  
              info = ip_info.get(ip, {})
              code = info.get('countryCode')
              name = info.get('country', 'Unknown')
              
              # УБИВАЕМ СЕРВЕРЫ ИЗ РФ БЕЗЖАЛОСТНО
              if code == 'RU':
                  continue
                  
              # Генерируем новое идеальное имя
              if code:
                  new_name = f"{get_flag(code)} {name}"
              else:
                  new_name = "🌍 Unknown"
                  
              # Отрезаем старое имя и приклеиваем новое в URL-кодировке
              base_url = line.split('#')[0]
              new_line = base_url + '#' + urllib.parse.quote(new_name) + '\n'
              clean_lines.append(new_line)
              
          with open('proxy_lists/fixed_proxies.txt', 'w') as f:
              f.writelines(clean_lines)
          EOF
          
          python3 filter.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: filtered RU and renamed all proxies"
          file_pattern: proxy_lists/fixed_proxies.txt
