name: Update, Fix, Convert and Clean Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Process Proxy List
        run: |
          mkdir -p proxy_lists
          
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt > proxy_lists/fixed_proxies.txt
          
          sed -i 's/obfs=none&//g' proxy_lists/fixed_proxies.txt
          sed -i 's/&obfs=none//g' proxy_lists/fixed_proxies.txt
          
          cat << 'EOF' > filter.py
          import urllib.request, json, re, socket, urllib.parse, base64

          with open('proxy_lists/fixed_proxies.txt', 'r') as f:
              lines = f.readlines()

          hosts = []
          for line in lines:
              match = re.search(r'@([^:/?#]+)', line)
              hosts.append(match.group(1) if match else "")

          ips = []
          for h in hosts:
              try:
                  ips.append(socket.gethostbyname(h) if h else "")
              except:
                  ips.append("")

          unique_ips = list(set([ip for ip in ips if ip]))
          ip_info = {}
          for i in range(0, len(unique_ips), 100):
              batch = unique_ips[i:i+100]
              req = urllib.request.Request('http://ip-api.com/batch?fields=query,countryCode,country', 
                                           data=json.dumps(batch).encode(), 
                                           headers={'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as resp:
                      for r in json.loads(resp.read().decode()):
                          ip_info[r.get('query')] = r
              except:
                  pass

          def get_flag(code):
              if not code or len(code) != 2: return "🌍"
              return chr(ord(code[0]) + 127397) + chr(ord(code[1]) + 127397)

          clean_lines = []
          country_counts = {}

          for line, ip in zip(lines, ips):
              line = line.strip()
              if not line or line.startswith('#'):
                  clean_lines.append(line + '\n')
                  continue

              parts = line.split('#')
              base_url = parts[0]
              original_name = urllib.parse.unquote(parts[1]) if len(parts) > 1 else "Unknown"
              
              # === МАГИЯ: КОНВЕРТЕР SS -> VLESS ===
              if base_url.startswith('ss://'):
                  try:
                      # Парсим структуру ss://Base64@host:port/?plugin=...
                      match = re.search(r'ss://([^@]+)@([^/?#]+)/?\?([^#]+)', base_url)
                      if match:
                          b64_info, host_port, query = match.groups()
                          # Чиним отступы Base64
                          b64_info += "=" * ((4 - len(b64_info) % 4) % 4)
                          userinfo = base64.b64decode(b64_info).decode('utf-8')
                          
                          # Если это VLESS под маской "none:"
                          if userinfo.startswith('none:'):
                              uuid = userinfo.split(':', 1)[1]
                              qs = urllib.parse.parse_qs(query)
                              plugin_str = qs.get('plugin', [''])[0]
                              
                              # Парсим параметры v2ray-plugin
                              opts = plugin_str.split(';')
                              ws_host = ""
                              ws_path = "/"
                              tls = "none"
                              for opt in opts:
                                  if opt.startswith('host='): ws_host = opt[5:]
                                  elif opt.startswith('path='): ws_path = opt[5:].replace('\\=', '=')
                                  elif opt == 'tls': tls = "tls"
                                  
                              # Собираем чистый VLESS!
                              base_url = f"vless://{uuid}@{host_port}?type=ws&security={tls}&host={ws_host}&path={urllib.parse.quote(ws_path)}"
                  except Exception as e:
                      pass # Если не удалось конвертировать, оставляем как есть
              # =====================================

              # Фильтр мусора (пробелы и т.д.)
              if " " in base_url or "🇨🇳" in base_url:
                  continue
                  
              # Если остался неконвертируемый старый SS с плагином - удаляем, он не заведется
              if base_url.startswith('ss://') and "plugin=" in base_url.lower():
                  continue

              # Фильтр RU
              if any(x in original_name for x in ["Russia", "🇷🇺", "Россия"]) or ".ru" in base_url:
                  continue

              info = ip_info.get(ip, {})
              geo_code = info.get('countryCode')
              geo_name = info.get('country')

              if geo_code == 'RU':
                  continue

              # Переименование
              if "Anycast" in original_name:
                  if geo_code and geo_name:
                      base_name = f"{get_flag(geo_code)} {geo_name}"
                  else:
                      base_name = "🌐 Anycast"
              else:
                  base_name = original_name.split('|')[0].strip().split(',')[0].strip()

              # Нумерация
              country_counts[base_name] = country_counts.get(base_name, 0) + 1
              final_name = f"{base_name} {country_counts[base_name]}"

              new_line = base_url + '#' + urllib.parse.quote(final_name) + '\n'
              clean_lines.append(new_line)

          with open('proxy_lists/fixed_proxies.txt', 'w') as f:
              f.writelines(clean_lines)
          EOF
          
          python3 filter.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: Converted fake SS to VLESS, fixed syntax"
          file_pattern: proxy_lists/fixed_proxies.txt
