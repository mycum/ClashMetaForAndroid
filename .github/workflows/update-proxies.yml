name: Update, Clean and Ping Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process and Ping Proxy List
        run: |
          mkdir -p proxy_lists
          
          # Качаем ТОЛЬКО базы Игарька (иранский источник удален)
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt > proxy_lists/raw_proxies.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt >> proxy_lists/raw_proxies.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt >> proxy_lists/raw_proxies.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS%2BAll_RUS.txt >> proxy_lists/raw_proxies.txt
          
          cat << 'EOF' > filter.py
          import urllib.request, json, re, socket, urllib.parse, base64, html
          from concurrent.futures import ThreadPoolExecutor

          print("📂 Загрузка баз Игарька...")
          with open('proxy_lists/raw_proxies.txt', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          unique_proxies = []
          seen_nodes = set()

          for line in lines:
              line = line.strip()
              if not line or line.startswith('#'): continue

              # Лечим HTML-мусор, но НЕ ТРОГАЕМ эмодзи
              line = line.replace('&amp;', '&').replace('&amp%3B', '&').replace('%3B', ';').replace('&;', '&').replace('?amp;', '?')
              line = html.unescape(line)

              parts = line.split('#')
              base_url = parts[0]
              original_name = urllib.parse.unquote(parts[1]) if len(parts) > 1 else ""

              # Конвертируем и лечим Shadowsocks
              if base_url.startswith('ss://'):
                  try:
                      match = re.search(r'ss://([^@]+)@([^/?#]+)/?\?([^#]+)', base_url)
                      if match:
                          b64_info, host_port, query = match.groups()
                          b64_info += "=" * ((4 - len(b64_info) % 4) % 4)
                          userinfo = base64.b64decode(b64_info).decode('utf-8')
                          
                          if userinfo.startswith('none:'):
                              uuid = userinfo.split(':', 1)[1]
                              qs = urllib.parse.parse_qs(query)
                              plugin_str = qs.get('plugin', [''])[0]
                              opts = plugin_str.split(';')
                              ws_host, ws_path, tls = "", "/", "none"
                              for opt in opts:
                                  if opt.startswith('host='): ws_host = opt[5:]
                                  elif opt.startswith('path='): ws_path = opt[5:].replace('\\=', '=')
                                  elif opt == 'tls': tls = "tls"
                              base_url = f"vless://{uuid}@{host_port}?type=ws&security={tls}&host={ws_host}&path={urllib.parse.quote(ws_path)}"
                  except: pass
                  
                  try:
                      match = re.search(r'ss://([^@]+)@', base_url)
                      if match:
                          b64_info = match.group(1)
                          b64_info += "=" * ((4 - len(b64_info) % 4) % 4)
                          userinfo = base64.b64decode(b64_info).decode('utf-8')
                          if ':' not in userinfo: continue 
                          method, password = userinfo.split(':', 1)
                          if not password.strip(): continue 
                          if method.lower() == 'auto':
                              new_userinfo = f"chacha20-ietf-poly1305:{password}"
                              new_b64 = base64.b64encode(new_userinfo.encode('utf-8')).decode('utf-8')
                              base_url = base_url.replace(match.group(1), new_b64)
                  except: continue 

              if " " in base_url or "🇨🇳" in base_url: continue
              match = re.search(r'@([^/?#]+)', base_url)
              if match:
                  host_port = match.group(1)
                  if host_port in seen_nodes: continue
                  seen_nodes.add(host_port)
                  hp_parts = host_port.split(':')
                  if len(hp_parts) == 2:
                      unique_proxies.append({'url': base_url, 'name': original_name, 'host': hp_parts[0], 'port': int(hp_parts[1])})

          print(f"🔍 Найдено уникальных серверов: {len(unique_proxies)}")

          def check_port(proxy):
              try:
                  ip = socket.gethostbyname(proxy['host'])
                  socket.create_connection((ip, proxy['port']), timeout=3)
                  proxy['ip'] = ip
                  return proxy
              except: return None

          print("⚡ TCP пинг...")
          alive_proxies = []
          with ThreadPoolExecutor(max_workers=30) as executor:
              results = executor.map(check_port, unique_proxies)
              for r in results:
                  if r: alive_proxies.append(r)

          print(f"✅ Физически работают: {len(alive_proxies)}")

          unique_ips = list(set([p['ip'] for p in alive_proxies]))
          ip_info = {}
          for i in range(0, len(unique_ips), 100):
              try:
                  batch = unique_ips[i:i+100]
                  req = urllib.request.Request('http://ip-api.com/batch?fields=query,countryCode,country', data=json.dumps(batch).encode())
                  with urllib.request.urlopen(req) as resp:
                      for r in json.loads(resp.read().decode()): ip_info[r.get('query')] = r
              except: pass

          def get_flag(c):
              if not c or len(c) != 2: return "🌍"
              return chr(ord(c[0]) + 127397) + chr(ord(c[1]) + 127397)

          final_links = []
          counts = {}
          for p in alive_proxies:
              raw_name = p['name'].strip()
              geo = ip_info.get(p['ip'], {})
              
              # Умная обработка Anycast и пустых имен
              if not raw_name or "Anycast" in raw_name or "🌐" in raw_name:
                  cc = geo.get('countryCode')
                  if cc:
                      base_name = f"{get_flag(cc)} {geo.get('country', 'Unknown')}"
                  else:
                      base_name = "🌍 Unknown"
              else:
                  # Берем флаг и страну Игарька, отсекая города и теги
                  base_name = raw_name.split('|')[0].split(',')[0].strip()

              counts[base_name] = counts.get(base_name, 0) + 1
              final_name = f"{base_name} {counts[base_name]}"
              
              final_links.append(f"{p['url']}#{urllib.parse.quote(final_name)}\n")

          with open('proxy_lists/raw_proxies.txt', 'w', encoding='utf-8') as f:
              f.writelines(final_links)
          print("💾 Сохранено в raw_proxies.txt")
          EOF
          
          python3 filter.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync: Igareck's proxies with precise GeoIP flags"
          file_pattern: proxy_lists/raw_proxies.txt
