name: Update, Clean and Ping Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process and Ping Proxy List
        run: |
          mkdir -p proxy_lists
          
          # Скачиваем базы Игарька
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt > proxy_lists/raw_temp.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt >> proxy_lists/raw_temp.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt >> proxy_lists/raw_temp.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS%2BAll_RUS.txt >> proxy_lists/raw_temp.txt
          
          cat << 'EOF' > filter.py
          import urllib.request, json, re, socket, urllib.parse, base64, html
          from concurrent.futures import ThreadPoolExecutor

          print("📂 Загрузка и подготовка...")
          with open('proxy_lists/raw_temp.txt', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          node_groups = {}
          url_to_name = {}

          for line in lines:
              line = line.strip()
              if not line or line.startswith('#'): continue
              
              line = line.replace('&amp;', '&').replace('&amp%3B', '&').replace('%3B', ';').replace('&;', '&').replace('?amp;', '?')
              line = html.unescape(line)

              parts = line.split('#')
              base_url = parts[0]
              name = urllib.parse.unquote(parts[1]) if len(parts) > 1 else ""

              # Лечим Shadowsocks и фейковые VLESS
              if base_url.startswith('ss://'):
                  # 1. Конвертер фейковых VLESS
                  try:
                      match = re.search(r'ss://([^@]+)@([^/?#]+)/?\?([^#]+)', base_url)
                      if match:
                          b64, hp, q = match.groups()
                          b64 += "=" * ((4 - len(b64) % 4) % 4)
                          userinfo = base64.b64decode(b64).decode('utf-8')
                          
                          if userinfo.startswith('none:'):
                              uuid = userinfo.split(':', 1)[1]
                              q = urllib.parse.unquote(q)
                              opts = q.split(';') if ';' in q else urllib.parse.parse_qs(q).get('plugin', [''])[0].split(';')
                              ws_host, ws_path, tls = "", "/", "none"
                              for opt in opts:
                                  if opt.startswith('host='): ws_host = opt[5:]
                                  elif opt.startswith('path='): ws_path = opt[5:]
                                  elif opt == 'tls': tls = "tls"
                              base_url = f"vless://{uuid}@{hp}?type=ws&security={tls}&host={ws_host}&path={urllib.parse.quote(ws_path)}"
                  except: pass
                  
                  # 2. Фикс "cipher: auto" для настоящих SS
                  try:
                      match = re.search(r'ss://([^@]+)@', base_url)
                      if match:
                          b64 = match.group(1)
                          b64 += "=" * ((4 - len(b64) % 4) % 4)
                          userinfo = base64.b64decode(b64).decode('utf-8')
                          if ':' in userinfo:
                              method, password = userinfo.split(':', 1)
                              if method.lower() == 'auto':
                                  new_b64 = base64.b64encode(f"chacha20-ietf-poly1305:{password}".encode('utf-8')).decode('utf-8')
                                  base_url = base_url.replace(match.group(1), new_b64)
                  except: pass

              # Определяем host:port
              match = re.search(r'@([^/?#]+)', base_url)
              if match:
                  hp = match.group(1)
                  hp_parts = hp.split(':')
                  if len(hp_parts) == 2:
                      target = (hp_parts[0], int(hp_parts[1]))
                      if target not in node_groups: node_groups[target] = []
                      if base_url not in node_groups[target]:
                          node_groups[target].append(base_url)
                          url_to_name[base_url] = name

          print(f"🔍 Найдено {len(node_groups)} уникальных IP:Port")

          def check_node(hp):
              host, port = hp
              try:
                  ip = socket.gethostbyname(host)
                  s = socket.create_connection((ip, port), timeout=3)
                  s.close()
                  return hp, ip
              except: return hp, None

          print("⚡ TCP пинг серверов...")
          alive_ips = {}
          with ThreadPoolExecutor(max_workers=40) as executor:
              results = executor.map(check_node, node_groups.keys())
              for hp, ip in results:
                  if ip: alive_ips[hp] = ip

          print(f"✅ Живых серверов: {len(alive_ips)}")

          # GeoIP
          unique_resolved_ips = list(set(alive_ips.values()))
          ip_info = {}
          for i in range(0, len(unique_resolved_ips), 100):
              try:
                  batch = unique_resolved_ips[i:i+100]
                  req = urllib.request.Request('http://ip-api.com/batch?fields=query,countryCode,country', data=json.dumps(batch).encode())
                  with urllib.request.urlopen(req) as resp:
                      for r in json.loads(resp.read().decode()): ip_info[r.get('query')] = r
              except: pass

          def get_flag(c): return chr(ord(c[0]) + 127397) + chr(ord(c[1]) + 127397) if (c and len(c)==2) else "🌍"

          final_links = []
          name_counts = {}

          for (host, port), ip in alive_ips.items():
              geo = ip_info.get(ip, {})
              for url in node_groups[(host, port)]:
                  raw_name = url_to_name.get(url, "")
                  
                  if not raw_name or "Anycast" in raw_name or "🌐" in raw_name:
                      cc = geo.get('countryCode')
                      base_name = f"{get_flag(cc)} {geo.get('country', 'Unknown')}"
                  else:
                      base_name = raw_name.split('|')[0].split(',')[0].strip()

                  name_counts[base_name] = name_counts.get(base_name, 0) + 1
                  final_name = f"{base_name} [{name_counts[base_name]}]"
                  final_links.append(f"{url}#{urllib.parse.quote(final_name)}\n")

          header = [
              "# profile-title: 🚀 Telegood VPN\n",
              "# profile-update-interval: 3\n",
              f"# 🟢 Total Variants: {len(final_links)}\n\n"
          ]

          with open('proxy_lists/fixed_proxies.txt', 'w', encoding='utf-8') as f:
              f.writelines(header + final_links)
          EOF
          
          python3 filter.py
          rm proxy_lists/raw_temp.txt

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync: All variants for live nodes preserved"
          file_pattern: proxy_lists/fixed_proxies.txt
